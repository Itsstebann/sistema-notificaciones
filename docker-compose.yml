version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: Itsstebann
      POSTGRES_PASSWORD: David1028*
      POSTGRES_DB: notificaciones_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data: